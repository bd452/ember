# cbindgen configuration for the Ember C ABI.
#
# Regenerate the header with:
#   cbindgen --crate ember --config cbindgen.toml --output include/ember.h
# (CI diff-checks the committed header against this.)

language = "C"
header = "/* Generated by cbindgen from the `ember` crate. Do not edit by hand. */"
include_guard = "EMBER_H"
tab_width = 4
documentation = true
documentation_style = "c"
cpp_compat = true
pragma_once = false

[defines]

[export]
prefix = ""
# Only the C ABI surface is exported; internal types stay out of the header.
include = [
    "ember_signal_i64",
    "ember_label",
    "ember_button",
    "ember_stack",
    "ember_app",
]

[parse]
parse_deps = false

[fn]
args = "vertical"

[enum]
prefix_with_name = true
